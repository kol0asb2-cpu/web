---

## `config/rules.yaml`

```yaml
system:
  name: jp_high_dividend_auto_judger
  version: 1.1
  philosophy:
    style: stability_first
    automation_level: full_pre_trade_automation
    execution: manual_only
    objective: stable_dividend_growth_with_capital_preservation
    notes:
      - "高利回り追求ではなく、配当継続性と財務健全性を優先"
      - "最終発注のみ人間が行う"
      - "公開情報・数値・イベントのみで判定"
      - "見逃しは許容、事故回避を優先"
      - "データ欠損・鮮度不足時は強引に判定しない"

universe:
  market: japan_equities
  included_exchanges:
    - TSE
  include_reits: false
  include_etfs: false
  include_preferreds: false

data_quality_policy:
  missing_action: SKIP
  stale_action: CAUTION
  invalid_action: SKIP
  freshness_rules:
    market_days_max: 5
    financial_days_warn: 365
    financial_days_invalid: 550

hard_filters:
  common:
    min_dividend_yield: 0.035
    min_market_cap_jpy: 10000000000
    min_avg_daily_value_20d_jpy: 50000000
    exclude_if_dividend_suspended: true
    exclude_if_going_concern_flag: true
    exclude_if_recent_dividend_cut: true
    exclude_if_data_invalid: true

  non_financial:
    exclude_if_payout_ratio_gt: 1.00
    caution_if_payout_ratio_gt: 0.80
    exclude_if_operating_cf_negative_years_ge: 2
    exclude_if_fcf_dividend_cover_negative_years_ge: 2
    caution_if_fcf_dividend_cover_negative_years_ge: 1
    exclude_if_operating_loss_years_ge: 2
    exclude_if_ordinary_loss_years_ge: 2
    exclude_if_equity_ratio_lt: 0.20
    caution_if_roe_lt: 0.05
    caution_if_eps_decline_years_ge: 2

  financial:
    enabled: true
    sectors:
      - banks
      - insurance
      - securities
      - other_financials
    exclude_if_recent_dividend_cut: true
    exclude_if_payout_ratio_gt: 1.00
    caution_if_payout_ratio_gt: 0.85
    caution_if_roe_lt: 0.05
    caution_if_profit_decline_years_ge: 2
    require_shareholder_return_policy_or_stable_dividend_record: true
    skip_metrics:
      - equity_ratio
      - net_debt_to_ebitda
      - operating_cf_negative_years
      - fcf_dividend_cover_negative_years

event_filters:
  exclude_keywords_title:
    - "減配"
    - "無配"
    - "継続企業の前提"
  caution_keywords_title:
    - "下方修正"
    - "特別損失"
    - "減損"
    - "不適切"
    - "行政処分"
    - "配当方針の変更"
  positive_keywords_title:
    - "累進配当"
    - "DOE"
    - "自己株式取得"
    - "株主還元方針"
    - "増配"

market_reaction_filters:
  caution_if_gap_down_after_earnings_lte: -0.08
  exclude_if_gap_down_after_earnings_lte: -0.15
  caution_if_abnormal_volume_down_after_earnings: true
  caution_if_dividend_yield_spike_ratio_ge: 1.30

quality_checks:
  use_simple_cf_quality_check: true
  simple_cf_quality_check:
    caution_if_ocf_lt_net_income_years_ge: 2
    caution_if_ocf_to_net_income_gap_ratio_ge: 0.30
  use_accruals_advanced: false

caution_scoring:
  enabled: true
  levels:
    minor: 1
    major: 2
  rules:
    payout_ratio_high:
      level: minor
    fcf_cover_one_year_negative:
      level: minor
    roe_too_low:
      level: minor
    eps_decline_two_years:
      level: minor
    ocf_quality_warning:
      level: minor
    caution_keyword_detected:
      level: major
    earnings_gap_down:
      level: major
    profit_decline_two_years_financial:
      level: minor
    stale_financial_data:
      level: minor
  thresholds:
    caution_score_new_buy_stop_ge: 3
    caution_score_investment_grade_loss_ge: 4

scoring:
  total_score: 100

  weights:
    dividend_stability: 30
    financial_soundness: 15
    cashflow_soundness: 20
    earnings_stability: 15
    shareholder_return_policy: 10
    yield_and_overheat: 5
    sector_adjustment: 5

  dividend_stability:
    years_non_cut_dividend:
      score_map:
        "0": 0
        "1-2": 2
        "3-4": 5
        "5-9": 8
        "10+": 12
    years_non_decrease_dividend:
      score_map:
        "0": 0
        "1-2": 2
        "3-4": 4
        "5-9": 6
        "10+": 8
    progressive_dividend_policy:
      true: 5
      false: 0
    dividend_cut_count_10y:
      score_map:
        "0": 5
        "1": 2
        "2+": 0

  financial_soundness:
    non_financial:
      equity_ratio:
        score_map:
          "<0.20": 0
          "0.20-0.29": 2
          "0.30-0.39": 4
          "0.40-0.49": 6
          "0.50+": 8
      roe:
        score_map:
          "<0.05": 0
          "0.05-0.079": 2
          "0.08-0.119": 4
          "0.12+": 7
    financial:
      roe:
        score_map:
          "<0.05": 0
          "0.05-0.079": 3
          "0.08-0.119": 5
          "0.12+": 7
      stable_return_policy:
        true: 4
        false: 0
      buyback_or_doe_policy:
        true: 4
        false: 0

  cashflow_soundness:
    non_financial:
      years_positive_operating_cf:
        score_map:
          "0-1": 0
          "2-3": 4
          "4-5": 7
          "6+": 9
      years_positive_fcf:
        score_map:
          "0-1": 0
          "2-3": 3
          "4-5": 6
          "6+": 8
      dividend_cover_by_fcf:
        score_map:
          "<1.0": 0
          "1.0-1.49": 3
          "1.5-1.99": 6
          "2.0+": 8
      ocf_quality_pass:
        true: 3
        false: 0
    financial:
      enabled: false

  earnings_stability:
    cv_formula:
      description: "cv = std(x) / abs(mean(x)); abs(mean)<epsilon の場合は inf"
      epsilon: 0.000001
    high:
      cv_lt: 0.15
      decline_count_max: 0
      negative_count_max: 0
      score_eps: 6
      score_operating_profit: 5
      score_revenue: 4
    medium:
      cv_lt: 0.30
      decline_count_max: 1
      negative_count_max: 0
      score_eps: 3
      score_operating_profit: 3
      score_revenue: 2
    low:
      score_eps: 0
      score_operating_profit: 0
      score_revenue: 0

  shareholder_return_policy:
    progressive_dividend_policy:
      true: 4
      false: 0
    doe_policy:
      true: 3
      false: 0
    buyback_recent_2y:
      true: 2
      false: 0
    explicit_shareholder_return_policy:
      true: 1
      false: 0

  yield_and_overheat:
    min_yield_pass:
      true: 2
      false: 0
    overheat_penalty:
      enabled: true
      formula: "(yield_avg_5y - yield_now) / yield_avg_5y"
      if_ratio_gt: 0.30
      if_current_yield_below_3pct_non_financial: true
      penalty_score: -3

  sector_adjustment:
    enabled: true
    sectors:
      financial:
        adjustment: 0
      core_stable:
        adjustment: 1
      trading_house:
        adjustment: 1
      infrastructure:
        adjustment: 0
      cyclical:
        adjustment: -1
      small_cap:
        adjustment: -2

portfolio_constraints:
  max_position_weight: 0.10
  max_sector_weight_default: 0.25
  sector_overrides:
    financial: 0.25
    banks: 0.25
    insurance: 0.20
    securities: 0.15
    telecom: 0.25
    trading_house: 0.25
    infrastructure: 0.20
    cyclical: 0.15
    small_cap: 0.10
  max_combined_financial_weight: 0.25

actions:
  buy:
    min_total_score: 75
    max_caution_score: 2
    require_investment_grade: true
    require_not_over_position_limit: true
    require_not_over_sector_limit: true
    require_data_quality_ok: true

  add:
    min_total_score: 70
    max_caution_score: 2
    require_existing_position: true
    require_not_over_position_limit: true
    require_not_over_sector_limit: true
    allow_stale_market_only: true

  hold:
    min_total_score: 55
    max_caution_score: 3
    require_no_exclude_trigger: true

  trim:
    trigger_if_over_position_limit: true
    trigger_if_sector_over_limit: true
    trigger_if_overheat_and_better_alternative_exists: true
    min_replacement_score_diff: 8

  exit:
    trigger_if_exclude: true
    trigger_if_caution_score_ge: 4
    trigger_if_dividend_cut: true
    trigger_if_investment_grade_lost: true

outputs:
  required:
    - ticker
    - investment_grade
    - data_quality_status
    - caution_score
    - total_score
    - action
    - exclude_reasons
    - caution_reasons
    - score_breakdown
    - sector_weight_after_trade
    - position_weight_after_trade