name: Run Judger

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'data/**'
      - 'config/**'
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  judge:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run judger
        run: make run

      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        with:
          name: judged-watchlist
          path: output/
          retention-days: 90
          if-no-files-found: error
